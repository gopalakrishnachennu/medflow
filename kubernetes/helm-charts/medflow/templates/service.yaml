{{- range $key, $service := .Values.services }}
{{- if $service.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ $service.name }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/component: {{ $service.name }}
  ports:
    - name: http
      port: 80
      targetPort: {{ $service.port }}
---
{{- end }}
{{- end }}

