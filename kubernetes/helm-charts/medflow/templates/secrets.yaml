apiVersion: v1
kind: Secret
metadata:
  name: medflow-auth-secrets
type: Opaque
stringData:
  database-url: "replace-with-external-secret"
  jwt-secret-key: "replace-with-external-secret"
  jwt-algorithm: "HS256"
  access-token-expire-minutes: "30"
  README: "Do not store real secrets in Git. Replace this template with External Secrets, SOPS, or Sealed Secrets."
