{{- range $key, $service := .Values.services }}
{{- if $service.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $service.name }}
  labels:
    app.kubernetes.io/component: {{ $service.name }}
spec:
  replicas: {{ $service.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: {{ $service.name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: {{ $service.name }}
    spec:
      serviceAccountName: {{ $.Values.serviceAccount.name }}
      securityContext:
{{ toYaml $.Values.podSecurityContext | indent 8 }}
      containers:
        - name: {{ $service.name }}
          image: "{{ $.Values.global.imageRegistry }}{{ $service.image.repository }}:{{ $service.image.tag }}"
          imagePullPolicy: IfNotPresent
          securityContext:
{{ toYaml $.Values.containerSecurityContext | indent 12 }}
          ports:
            - containerPort: {{ $service.port }}
          env:
            - name: ENVIRONMENT
              value: {{ $.Values.global.environment | quote }}
{{- range $name, $value := $service.env }}
            - name: {{ $name }}
              value: {{ $value | quote }}
{{- end }}
{{- range $name, $secret := $service.secretEnv }}
            - name: {{ $name }}
              valueFrom:
                secretKeyRef:
                  name: {{ $secret.secretName }}
                  key: {{ $secret.key }}
{{- end }}
          envFrom:
            - configMapRef:
                name: medflow-config
          readinessProbe:
            httpGet:
              path: /health
              port: {{ $service.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: {{ $service.port }}
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
{{ toYaml $service.resources | indent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
{{- end }}
{{- end }}
