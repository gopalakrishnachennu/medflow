name: medflow-ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  auth-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/services/auth-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: src/services/auth-service/requirements.txt
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements.txt
      - run: python -m ruff check app tests
      - run: python -m pytest

  helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - run: helm lint kubernetes/helm-charts/medflow
      - run: helm template medflow kubernetes/helm-charts/medflow -f kubernetes/helm-charts/medflow/values-dev.yaml

  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infrastructure/environments/dev
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - run: terraform fmt -recursive -check ../..
      - run: terraform init -backend=false
      - run: terraform validate

