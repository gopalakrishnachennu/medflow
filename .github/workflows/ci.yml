name: 🏗️ CI — Build, Test & Push to ECR

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Cancel previous runs on the same branch
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-2
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  PROJECT_NAME: medflow

permissions:
  id-token: write   # Required for OIDC authentication
  contents: write   # Required to commit helm values
  pull-requests: write  # Required to post PR comments
  security-events: write # Required to upload SARIF

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1: Detect which services changed (matrix strategy)
  # ─────────────────────────────────────────────────────────────
  detect-changes:
    name: 🔍 Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            auth-service:
              - 'src/services/auth-service/**'
            patient-service:
              - 'src/services/patient-service/**'
            appointment-service:
              - 'src/services/appointment-service/**'
            records-service:
              - 'src/services/records-service/**'
            pharmacy-service:
              - 'src/services/pharmacy-service/**'
            billing-service:
              - 'src/services/billing-service/**'
            notification-service:
              - 'src/services/notification-service/**'
            frontend:
              - 'src/frontend/**'

  # ─────────────────────────────────────────────────────────────
  # JOB 2: Test and scan each changed service in parallel
  # ─────────────────────────────────────────────────────────────
  test-and-scan:
    name: 🧪 Test & Scan — ${{ matrix.service }}
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.services != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      # ── Python services ─────────────────────────────────────
      - name: 🐍 Set up Python
        if: matrix.service != 'frontend'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: src/services/${{ matrix.service }}/requirements.txt

      - name: 📦 Install dependencies
        if: matrix.service != 'frontend'
        working-directory: src/services/${{ matrix.service }}
        run: pip install -r requirements.txt

      - name: ✅ Run unit tests
        if: matrix.service != 'frontend'
        working-directory: src/services/${{ matrix.service }}
        run: |
          pip install pytest pytest-cov
          pytest tests/ -v --cov=app --cov-report=xml --cov-report=term-missing
        env:
          DATABASE_URL: "sqlite:///./test.db"
          SECRET_KEY: "test-secret-key-for-ci"
          ENVIRONMENT: "test"
          PYTHONPATH: "."

      - name: 📊 Upload coverage report
        if: matrix.service != 'frontend'
        uses: codecov/codecov-action@v4
        with:
          files: src/services/${{ matrix.service }}/coverage.xml
          flags: ${{ matrix.service }}

      # ── SonarQube SAST scan ─────────────────────────────────
      # - name: 🔍 SonarQube Scan
      #   if: matrix.service != 'frontend' && github.event_name == 'push'
      #   uses: SonarSource/sonarcloud-github-action@master
      #   env:
      #     GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      #     SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      #   with:
      #     projectBaseDir: src/services/${{ matrix.service }}

      # ── Frontend (Node/Vite) ─────────────────────────────────
      - name: 🟨 Set up Node.js
        if: matrix.service == 'frontend'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/frontend/package-lock.json

      - name: 📦 Install frontend deps
        if: matrix.service == 'frontend'
        working-directory: src/frontend
        run: npm ci

      - name: 🏗️ Build frontend
        if: matrix.service == 'frontend'
        working-directory: src/frontend
        run: npm run build

  # ─────────────────────────────────────────────────────────────
  # JOB 3: OWASP Dependency Check (security scan)
  # ─────────────────────────────────────────────────────────────
  owasp-scan:
    name: 🛡️ OWASP Dependency Check
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        env:
          JAVA_HOME: /opt/jdk
        with:
          project: "medflow"
          path: "src/"
          format: "HTML"
          out: "reports"
          args: >
            --enableRetired

      - name: Upload OWASP Report
        uses: actions/upload-artifact@v4
        with:
          name: owasp-report
          path: reports/

  # ─────────────────────────────────────────────────────────────
  # JOB 4: Build Docker images and push to ECR
  # ─────────────────────────────────────────────────────────────
  build-and-push:
    name: 🐳 Build & Push — ${{ matrix.service }}
    needs: [detect-changes, test-and-scan]
    if: |
      github.ref == 'refs/heads/main' &&
      needs.detect-changes.outputs.services != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      # ── Authenticate to AWS via OIDC (no static credentials!) ─
      - name: 🔑 Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/${{ env.PROJECT_NAME }}-github-actions
          role-session-name: GitHubActions-CI-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: 🔐 Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # ── Docker build with cache ──────────────────────────────
      - name: 🏗️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🐳 Build & push image
        uses: docker/build-push-action@v5
        with:
          context: src/services/${{ matrix.service }}
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.PROJECT_NAME }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=${{ github.repositoryUrl }}
            org.opencontainers.image.revision=${{ github.sha }}

      # ── Trivy container scan ─────────────────────────────────
      - name: 🔍 Trivy container scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.ecr-login.outputs.registry }}/${{ env.PROJECT_NAME }}/${{ matrix.service }}:${{ github.sha }}
          format: "sarif"
          output: "trivy-${{ matrix.service }}.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "0"

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-${{ matrix.service }}.sarif"
          category: "trivy-${{ matrix.service }}"

      # ── Update Helm values with new image tag ────────────────
      - name: 🎯 Update image tag in Helm values
        run: |
          python scripts/setup/update_helm_image_tag.py \
            --service ${{ matrix.service }} \
            --tag ${{ github.sha }} \
            --values-file kubernetes/helm-charts/medflow/values-dev.yaml

      - name: Commit updated image tag
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add kubernetes/helm-charts/medflow/values-dev.yaml
          git diff --staged --quiet || git commit -m "ci: update ${{ matrix.service }} image to ${{ github.sha }}"
          git push
