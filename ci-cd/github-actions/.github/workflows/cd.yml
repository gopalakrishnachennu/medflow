name: 🚀 CD — Deploy to EKS via ArgoCD

on:
  # Triggered automatically after CI succeeds on main
  workflow_run:
    workflows: ["🏗️ CI — Build, Test & Push to ECR"]
    types: [completed]
    branches: [main]
  # Or manually trigger for any environment
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options: [dev, staging, prod]

env:
  AWS_REGION: us-east-2
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  PROJECT_NAME: medflow

permissions:
  id-token: write
  contents: read
  deployments: write

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1: Deploy to Dev (automatic on every main push)
  # ─────────────────────────────────────────────────────────────
  deploy-dev:
    name: 🌿 Deploy to Dev
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'dev')
    environment:
      name: dev
      url: https://dev.medflow.internal

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      # ── Authenticate to AWS via OIDC ─────────────────────────
      - name: 🔑 Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/${{ env.PROJECT_NAME }}-github-actions
          role-session-name: GitHubActions-CD-Dev-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      # ── Set up kubectl against EKS ────────────────────────────
      - name: ⚙️ Configure kubectl for EKS Dev
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.PROJECT_NAME }}-dev \
            --region ${{ env.AWS_REGION }}

      # ── Install ArgoCD CLI ────────────────────────────────────
      - name: 📦 Install ArgoCD CLI
        run: |
          curl -sSL -o argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x argocd
          sudo mv argocd /usr/local/bin/

      # ── Trigger ArgoCD sync (GitOps) ──────────────────────────
      - name: 🔄 Sync ArgoCD dev application
        run: |
          argocd login \
            ${{ secrets.ARGOCD_SERVER_DEV }} \
            --username admin \
            --password ${{ secrets.ARGOCD_PASSWORD_DEV }} \
            --insecure

          argocd app sync medflow-dev \
            --revision main \
            --timeout 120

          argocd app wait medflow-dev \
            --health \
            --timeout 300

      # ── Smoke tests after deploy ──────────────────────────────
      - name: 🩺 Health check — Auth Service
        run: |
          kubectl run smoke-test \
            --image=curlimages/curl:latest \
            --restart=Never \
            --rm \
            -it \
            -n medflow-dev \
            -- curl -sf http://auth-service/health

  # ─────────────────────────────────────────────────────────────
  # JOB 2: Deploy to Staging (manual approval required)
  # ─────────────────────────────────────────────────────────────
  deploy-staging:
    name: 🔶 Deploy to Staging
    runs-on: ubuntu-latest
    needs: deploy-dev
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging'
    environment:
      name: staging
      url: https://staging.medflow.internal

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🔑 Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/${{ env.PROJECT_NAME }}-github-actions
          role-session-name: GitHubActions-CD-Staging-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: ⚙️ Configure kubectl for EKS Staging
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.PROJECT_NAME }}-staging \
            --region ${{ env.AWS_REGION }}

      - name: 🗄️ Run database migrations (Alembic)
        run: |
          # Run migrations via a Kubernetes Job before deploying new pods
          kubectl apply -f - <<EOF
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: alembic-migration-${{ github.sha }}
            namespace: medflow-staging
          spec:
            ttlSecondsAfterFinished: 300
            template:
              spec:
                containers:
                - name: migrate
                  image: ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.PROJECT_NAME }}/auth-service:${{ github.sha }}
                  command: ["alembic", "upgrade", "head"]
                  envFrom:
                  - secretRef:
                      name: medflow-db-credentials
                restartPolicy: Never
          EOF

          kubectl wait job/alembic-migration-${{ github.sha }} \
            -n medflow-staging \
            --for=condition=complete \
            --timeout=120s

      - name: 🔄 Sync ArgoCD staging application
        run: |
          curl -sSL -o argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x argocd && sudo mv argocd /usr/local/bin/

          argocd login \
            ${{ secrets.ARGOCD_SERVER_STAGING }} \
            --username admin \
            --password ${{ secrets.ARGOCD_PASSWORD_STAGING }} \
            --insecure

          argocd app sync medflow-staging --timeout 180
          argocd app wait medflow-staging --health --timeout 600

  # ─────────────────────────────────────────────────────────────
  # JOB 3: Deploy to Production (blue-green via Istio)
  # ─────────────────────────────────────────────────────────────
  deploy-prod:
    name: 🔴 Deploy to Production (Blue-Green)
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod'
    environment:
      name: prod
      url: https://medflow.internal

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🔑 Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/${{ env.PROJECT_NAME }}-github-actions
          role-session-name: GitHubActions-CD-Prod-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: ⚙️ Configure kubectl for EKS Prod
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.PROJECT_NAME }}-prod \
            --region ${{ env.AWS_REGION }}

      - name: 🔵🟢 Blue-Green deploy (Istio traffic shift)
        run: |
          # Deploy GREEN version (new pods run alongside BLUE, 0% traffic)
          kubectl apply -f kubernetes/istio/blue-green/green-deployment.yaml \
            -n medflow-prod

          # Wait for GREEN pods to be healthy
          kubectl rollout status deployment/medflow-green \
            -n medflow-prod \
            --timeout=300s

          # Shift 10% traffic to GREEN, 90% to BLUE (canary test)
          kubectl patch virtualservice medflow -n medflow-prod \
            --type merge \
            -p '{"spec":{"http":[{"route":[{"destination":{"host":"medflow-blue"},"weight":90},{"destination":{"host":"medflow-green"},"weight":10}]}]}}'

          echo "Waiting 60s to observe error rate on GREEN..."
          sleep 60

          # Check error rate (if >1% errors, abort)
          ERROR_RATE=$(kubectl exec -n istio-system deploy/prometheus -- \
            curl -sg 'http://localhost:9090/api/v1/query?query=rate(istio_requests_total{destination_app="medflow-green",response_code=~"5.."}[1m])/rate(istio_requests_total{destination_app="medflow-green"}[1m])' \
            | jq '.data.result[0].value[1] // "0"' -r)

          if (( $(echo "$ERROR_RATE > 0.01" | bc -l) )); then
            echo "❌ Error rate ${ERROR_RATE} too high — rolling back to BLUE"
            kubectl patch virtualservice medflow -n medflow-prod \
              --type merge \
              -p '{"spec":{"http":[{"route":[{"destination":{"host":"medflow-blue"},"weight":100}]}]}}'
            exit 1
          fi

          # Shift 100% traffic to GREEN
          kubectl patch virtualservice medflow -n medflow-prod \
            --type merge \
            -p '{"spec":{"http":[{"route":[{"destination":{"host":"medflow-green"},"weight":100}]}]}}'

          echo "✅ Production deployment complete — GREEN is now live"

      - name: 📣 Notify Slack on success
        if: success()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "✅ MedFlow *PROD* deployment succeeded! Commit: ${{ github.sha }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: 📣 Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "❌ MedFlow *PROD* deployment FAILED! Check run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
