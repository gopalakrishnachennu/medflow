name: 🛡️ Security — Scheduled & PR Scans

on:
  schedule:
    # Full security audit every night at 2 AM UTC
    - cron: "0 2 * * *"
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths:
      - "infrastructure/**"
      - "src/**"
      - "kubernetes/**"

permissions:
  id-token: write
  contents: read
  security-events: write  # Required for SARIF uploads to GitHub Security tab
  pull-requests: write

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1: Terraform IaC Security Scan (Checkov + tfsec)
  # ─────────────────────────────────────────────────────────────
  terraform-security:
    name: 🏗️ IaC Scan — Checkov + tfsec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🔍 Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: infrastructure/
          framework: terraform
          output_format: sarif
          output_file_path: reports/checkov.sarif
          config_file: security/scanning/checkov-config.yaml
          soft_fail: false

      - name: Upload Checkov SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: reports/checkov.sarif
          category: checkov-terraform

      - name: 🔍 Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          working_directory: infrastructure/
          format: sarif
          sarif_file: reports/tfsec.sarif
          soft_fail: false

      - name: Upload tfsec SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: reports/tfsec.sarif
          category: tfsec-terraform

  # ─────────────────────────────────────────────────────────────
  # JOB 2: Kubernetes Manifest Security (Kubescape)
  # ─────────────────────────────────────────────────────────────
  kubernetes-security:
    name: ☸️ K8s Scan — Kubescape
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🔍 Run Kubescape
        uses: kubescape/github-action@main
        with:
          format: sarif
          outputFile: reports/kubescape.sarif
          files: "kubernetes/"
          frameworks: "NSA,MITRE"
          failedThreshold: 50

      - name: Upload Kubescape SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: reports/kubescape.sarif
          category: kubescape-k8s

  # ─────────────────────────────────────────────────────────────
  # JOB 3: Secret scanning (detect leaked credentials)
  # ─────────────────────────────────────────────────────────────
  secret-scan:
    name: 🔑 Secret Scan — GitLeaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for secret scanning

      - name: 🔍 Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────────────────────
  # JOB 4: SBOM generation (Software Bill of Materials)
  # ─────────────────────────────────────────────────────────────
  generate-sbom:
    name: 📋 Generate SBOM
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service:
          - auth-service
          - patient-service
          - appointment-service
          - records-service
          - pharmacy-service
          - billing-service
          - notification-service
    steps:
      - uses: actions/checkout@v4

      - name: 🔑 Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/medflow-github-actions
          aws-region: us-east-2

      - name: 🔐 Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: 📋 Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          image: ${{ steps.ecr-login.outputs.registry }}/medflow/${{ matrix.service }}:latest
          format: spdx-json
          output-file: sbom-${{ matrix.service }}.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.service }}
          path: sbom-${{ matrix.service }}.spdx.json

  # ─────────────────────────────────────────────────────────────
  # JOB 5: Terraform plan on PRs (post results as PR comment)
  # ─────────────────────────────────────────────────────────────
  terraform-plan:
    name: 📋 Terraform Plan — Dev
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: 🔑 Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/medflow-github-actions
          aws-region: us-east-2

      - name: ⚙️ Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"

      - name: 🔧 Terraform Init
        working-directory: infrastructure/environments/dev
        run: terraform init

      - name: 📋 Terraform Plan
        id: plan
        working-directory: infrastructure/environments/dev
        run: terraform plan -no-color -var-file=terraform.tfvars 2>&1 | tee /tmp/terraform-plan.txt
        continue-on-error: true

      - name: 💬 Post Plan as PR Comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('/tmp/terraform-plan.txt', 'utf8').slice(0, 65536);
            const output = `## 🏗️ Terraform Plan — Dev
            
            \`\`\`terraform
            ${plan}
            \`\`\`
            
            *Triggered by: @${{ github.actor }}, Action: ${{ github.event_name }}*`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      - name: ✅ Check Terraform Plan status
        if: steps.plan.outcome == 'failure'
        run: exit 1
